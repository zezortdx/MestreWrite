name: build

# Compila os instaladores em runners NATIVOS: macOS (.dmg/.zip) e Windows (.exe).
# - Push de tag `vX.Y.Z` → compila e publica os artefatos na Release.
# - Execução manual (workflow_dispatch) → compila e guarda como artifacts.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
          - os: windows-latest
            script: dist:win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (${{ matrix.os }})
        run: npm run ${{ matrix.script }}
        env:
          # Não tentar assinar no macOS do CI (build não assinado).
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Sem auto-publish do electron-builder; a Release é feita no job `release`.

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publicar Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
