<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body {
        margin: 0;
        width: 1024px;
        height: 1024px;
        background: transparent;
        overflow: hidden;
      }
      /* Squircle do ícone (com a margem que o macOS espera ~100px). */
      .icone {
        position: absolute;
        left: 100px;
        top: 100px;
        width: 824px;
        height: 824px;
        border-radius: 185px;
        overflow: hidden;
        background: radial-gradient(125% 120% at 30% 16%, #5a2fb0 0%, #2c1668 46%, #140a2e 100%);
        box-shadow:
          inset 0 3px 8px rgba(255, 255, 255, 0.22),
          inset 0 -40px 100px rgba(0, 0, 0, 0.5);
      }
      /* Brilho central que envolve o orb. */
      .glow {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 47%, rgba(190, 130, 255, 0.5), transparent 62%);
      }
      /* O orb iridescente (mesmo shader do app). */
      canvas.orb {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 600px;
        height: 600px;
        transform: translate(-50%, -52%);
        filter: drop-shadow(0 0 46px rgba(150, 80, 255, 0.65));
      }
      /* Realce vítreo no topo (profundidade). */
      .top {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        height: 48%;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent);
      }
    </style>
  </head>
  <body>
    <div class="icone">
      <div class="glow"></div>
      <canvas class="orb" width="1200" height="1200"></canvas>
      <div class="top"></div>
    </div>

    <script src="../src/overlay/orb-core.js"></script>
    <script>
      const canvas = document.querySelector(".orb");
      const orb = window.MestreOrb ? window.MestreOrb.montar(canvas, {}) : null;
      // Avança o tempo do shader para um quadro "maduro" (mais bonito que t=0).
      let t = 0;
      function frame(ts) {
        if (!t) t = ts;
        const dt = Math.min(0.05, (ts - t) / 1000);
        t = ts;
        if (orb) orb.passo(dt, { rotSpeed: 0.5, timeScale: 1.0, hover: 0.4, hoverIntensity: 0.5 });
        requestAnimationFrame(frame);
      }
      if (orb) requestAnimationFrame(frame);
      window.__orbPronto = !!orb;
    </script>
  </body>
</html>
