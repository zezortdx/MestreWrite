<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body {
        margin: 0;
        width: 1024px;
        height: 1024px;
        background: transparent;
        overflow: hidden;
      }
      /* Squircle BRANCO (com a margem que o macOS espera ~100px). */
      .icone {
        position: absolute;
        left: 100px;
        top: 100px;
        width: 824px;
        height: 824px;
        border-radius: 185px;
        overflow: hidden;
        background: linear-gradient(180deg, #ffffff 0%, #f5f1ff 100%);
        box-shadow:
          inset 0 4px 6px rgba(255, 255, 255, 0.9),
          inset 0 -60px 120px rgba(120, 60, 220, 0.06),
          inset 0 0 0 3px rgba(140, 80, 255, 0.07);
      }
      /* Glow violeta suave envolvendo o orb (sobre o branco). */
      .glow {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 47%, rgba(160, 90, 255, 0.22), transparent 60%);
      }
      /* O orb iridescente (mesmo shader do app). */
      canvas.orb {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 600px;
        height: 600px;
        transform: translate(-50%, -50%);
        filter: drop-shadow(0 10px 30px rgba(120, 50, 230, 0.35));
      }
    </style>
  </head>
  <body>
    <div class="icone">
      <div class="glow"></div>
      <canvas class="orb" width="1200" height="1200"></canvas>
    </div>

    <script src="../src/overlay/orb-core.js"></script>
    <script>
      const canvas = document.querySelector(".orb");
      const orb = window.MestreOrb ? window.MestreOrb.montar(canvas, {}) : null;
      let t = 0;
      function frame(ts) {
        if (!t) t = ts;
        const dt = Math.min(0.05, (ts - t) / 1000);
        t = ts;
        if (orb) orb.passo(dt, { rotSpeed: 0.5, timeScale: 1.0, hover: 0.4, hoverIntensity: 0.5 });
        requestAnimationFrame(frame);
      }
      if (orb) requestAnimationFrame(frame);
      window.__orbPronto = !!orb;
    </script>
  </body>
</html>
