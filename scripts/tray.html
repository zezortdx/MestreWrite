<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body {
        margin: 0;
        width: 256px;
        height: 256px;
        background: transparent;
        overflow: hidden;
      }
      /* Só o orb, sem fundo — vira o ícone da barra de menus (tray). */
      canvas.orb {
        position: absolute;
        left: 50%;
        top: 50%;
        /* Orb completo dentro da caixa (anel iridescente visível) + glow leve. */
        width: 256px;
        height: 256px;
        transform: translate(-50%, -50%);
        filter: drop-shadow(0 0 10px rgba(150, 80, 255, 0.55));
      }
    </style>
  </head>
  <body>
    <canvas class="orb" width="640" height="640"></canvas>

    <script src="../src/overlay/orb-core.js"></script>
    <script>
      const canvas = document.querySelector(".orb");
      const orb = window.MestreOrb ? window.MestreOrb.montar(canvas, {}) : null;
      let t = 0;
      function frame(ts) {
        if (!t) t = ts;
        const dt = Math.min(0.05, (ts - t) / 1000);
        t = ts;
        if (orb) orb.passo(dt, { rotSpeed: 0.5, timeScale: 1.0, hover: 0.4, hoverIntensity: 0.5 });
        requestAnimationFrame(frame);
      }
      if (orb) requestAnimationFrame(frame);
      window.__orbPronto = !!orb;
    </script>
  </body>
</html>
