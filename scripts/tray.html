<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body {
        margin: 0;
        width: 256px;
        height: 256px;
        background: transparent;
        overflow: hidden;
      }
      /* Só o orb, sem fundo — vira o ícone da barra de menus (tray). */
      /* Base preenchida do orb — dá corpo p/ ler bem na barra (o shader só faz
         o anel iridescente, que sozinho fica fraco em tamanho pequeno). */
      .base {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 190px;
        height: 190px;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: radial-gradient(circle at 50% 40%, #cbb0ff 0%, #9a63ff 50%, #7a3df0 78%, #5a2fc0 100%);
        filter: drop-shadow(0 0 16px rgba(150, 80, 255, 0.6));
      }

      canvas.orb {
        position: absolute;
        left: 50%;
        top: 50%;
        /* Anel iridescente do shader por cima da base preenchida. */
        width: 256px;
        height: 256px;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <div class="base"></div>
    <canvas class="orb" width="640" height="640"></canvas>

    <script src="../src/overlay/orb-core.js"></script>
    <script>
      const canvas = document.querySelector(".orb");
      const orb = window.MestreOrb ? window.MestreOrb.montar(canvas, {}) : null;
      let t = 0;
      function frame(ts) {
        if (!t) t = ts;
        const dt = Math.min(0.05, (ts - t) / 1000);
        t = ts;
        if (orb) orb.passo(dt, { rotSpeed: 0.5, timeScale: 1.0, hover: 0.4, hoverIntensity: 0.5 });
        requestAnimationFrame(frame);
      }
      if (orb) requestAnimationFrame(frame);
      window.__orbPronto = !!orb;
    </script>
  </body>
</html>
